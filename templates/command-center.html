<!doctype html>
<html lang="en">
<!--
  FOUNDRY — COMMAND CENTER TEMPLATE (the CEO cockpit / launch target)
  Personalize by editing the COMPANY object below, or generate this file from data/company.json.
  Every module card links to a generated artifact. Keep it offline & self-contained.
  Sample data = "Evergreen Grounds Co." so the template renders beautifully as-is.
-->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Center</title>
<style>
  :root{
    --bg:#0B1220;--bg2:#111a2e;--surface:#141d31;--border:#243049;
    --text:#E8EDF6;--muted:#94A3B8;--accent:#4F8CFF;--emerald:#22D3A6;--amber:#F5A524;
    --danger:#EF4444;--brand:var(--emerald);
  }
  *{box-sizing:border-box}
  body{
    margin:0;color:var(--text);
    font-family:-apple-system,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:radial-gradient(1400px 900px at 50% -12%,var(--bg2),var(--bg));min-height:100vh;
  }
  .wrap{max-width:1240px;margin:0 auto;padding:26px 26px 70px}
  /* top bar */
  .top{display:flex;align-items:center;gap:16px;margin-bottom:8px}
  .logo{width:54px;height:54px;border-radius:15px;flex:0 0 auto;
    background:linear-gradient(135deg,var(--accent),var(--brand));
    display:grid;place-items:center;font-weight:800;color:#04121f;font-size:26px}
  .name h1{margin:0;font-size:30px;font-weight:800;letter-spacing:-.01em}
  .name .tag{color:var(--muted);font-size:15px;margin-top:3px}
  .live{margin-left:auto;display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;
    background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:8px 14px}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--emerald);box-shadow:0 0 0 0 rgba(34,211,166,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,211,166,.55)}70%{box-shadow:0 0 0 10px rgba(34,211,166,0)}100%{box-shadow:0 0 0 0 rgba(34,211,166,0)}}
  /* activity ticker */
  .ticker{margin:14px 0 26px;background:var(--surface);border:1px solid var(--border);border-radius:12px;
    padding:12px 16px;display:flex;align-items:center;gap:12px;overflow:hidden}
  .ticker .lbl{color:var(--emerald);font-size:12px;font-weight:700;letter-spacing:.12em;text-transform:uppercase;white-space:nowrap}
  .ticker .feed{color:var(--text);font-size:14px;white-space:nowrap;transition:opacity .4s}
  .ticker .feed .ago{color:var(--muted);margin-left:8px;font-size:12px}
  /* KPI row */
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px 18px}
  .kpi .k{color:var(--muted);font-size:11px;letter-spacing:.14em;text-transform:uppercase}
  .kpi .v{font-size:30px;font-weight:800;margin-top:8px;line-height:1}
  .kpi .d{font-size:12px;margin-top:8px;font-weight:600}
  .up{color:var(--emerald)} .dn{color:var(--danger)}
  /* section label */
  .seclabel{display:flex;align-items:center;gap:12px;margin:6px 0 16px;color:var(--muted);
    font-size:12px;letter-spacing:.16em;text-transform:uppercase}
  .seclabel::after{content:"";flex:1;height:1px;background:var(--border)}
  /* module grid */
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .mod{display:block;text-decoration:none;color:inherit;background:var(--surface);
    border:1px solid var(--border);border-radius:16px;padding:20px;transition:.16s;position:relative}
  .mod:hover{transform:translateY(-3px);border-color:var(--accent);box-shadow:0 18px 40px rgba(0,0,0,.4)}
  .mod .ico{font-size:26px}
  .mod .mt{font-weight:700;font-size:16px;margin-top:12px}
  .mod .md{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.45;min-height:34px}
  .mod .ms{margin-top:12px;font-size:13px;font-weight:700;color:var(--brand)}
  .mod .arrow{position:absolute;top:18px;right:18px;color:var(--muted);opacity:0;transition:.16s}
  .mod:hover .arrow{opacity:1;transform:translateX(2px)}
  /* footer story */
  .story{margin-top:34px;background:linear-gradient(135deg,rgba(79,140,255,.10),rgba(34,211,166,.08));
    border:1px solid var(--border);border-radius:18px;padding:26px 28px;text-align:center}
  .story .big{font-size:22px;font-weight:800}
  .story .sub{color:var(--muted);margin-top:8px;font-size:15px}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo" id="logo">E</div>
    <div class="name">
      <h1 id="cname">Company Name</h1>
      <div class="tag" id="ctag">Tagline goes here</div>
    </div>
    <div class="live"><span class="pulse"></span> <span id="livetxt">All systems operational</span></div>
  </div>

  <div class="ticker">
    <span class="lbl">◆ AI Workforce</span>
    <span class="feed" id="feed">Booting the company…</span>
  </div>

  <div class="kpis" id="kpis"></div>

  <div class="seclabel">Operating Modules</div>
  <div class="grid" id="grid"></div>

  <div class="story">
    <div class="big" id="storybig">That took about twelve minutes.</div>
    <div class="sub">Our students spend twelve weeks learning to build what you just watched. This isn't the project — this is <b>Lesson One</b>.</div>
  </div>
</div>

<script>
/* ============================================================
   PERSONALIZE HERE — Claude Code replaces this object from data/company.json
   ============================================================ */
const COMPANY = {
  name: "Evergreen Grounds Co.",
  monogram: "E",
  tagline: "Full-service landscaping that runs itself.",
  accent: "#22D3A6",
  kpis: [
    { k:"Revenue (ARR)", v:"$1.24M", d:"▲ 18% vs last yr", up:true },
    { k:"Customers", v:"312", d:"▲ 24 this month", up:true },
    { k:"Human Team", v:"9", d:"crew + office", up:true },
    { k:"AI Employees", v:"27", d:"● all active", up:true },
    { k:"Pipeline", v:"$186K", d:"▲ 12% WoW", up:true },
    { k:"CSAT", v:"4.8★", d:"▲ 0.2", up:true },
  ],
  activity: [
    ["Lead Qualification Agent booked an appointment","2s ago"],
    ["Invoicing Agent sent invoice #1043 ($2,400)","11s ago"],
    ["Scheduling Agent routed 3 crews for tomorrow","28s ago"],
    ["Marketing Agent published a spring-cleanup post","41s ago"],
    ["Review Agent requested a 5★ review from J. Alvarez","1m ago"],
    ["Collections Agent recovered a 30-day overdue invoice","2m ago"],
  ],
  modules: [
    ["📊","Executive Dashboard","Live KPIs across the whole company","6 KPIs live","../dashboards/executive.html"],
    ["🌐","Website","Customer-facing marketing site","312 visitors today","../website/index.html"],
    ["🤝","CRM","Pipeline, contacts & deals","28 open deals","../crm/index.html"],
    ["📣","Marketing","Campaigns, channels & funnel","4 active campaigns","../marketing/plan.html"],
    ["💰","Sales","Funnel, scripts & conversion","31% win rate","../sales/funnel.html"],
    ["📈","Finance","12-month model & cash","$142K cash","../finance/model.html"],
    ["🛠️","Operations","Scheduling, dispatch & jobs","41 jobs this week","../dashboards/operations.html"],
    ["🔎","Analytics","Trends, cohorts & forecast","+22% forecast","../analytics/index.html"],
    ["👥","Workforce","AI + human org chart","27 AI · 9 human","../workforce/org-chart.html"],
    ["🤖","AI Employees","Your always-on AI team","27 active","../workforce/ai-employees.html"],
    ["🔄","Automations","End-to-end workflows","9 flows running","../automations/index.html"],
    ["🗄️","Database","Schema & sample data","11 tables","../database/schema.html"],
    ["📋","SOPs","How the company runs","8 procedures","../sops/index.html"],
    ["🗺️","Roadmap","30 / 60 / 90 + 12-month","Day 1 today","../roadmap/index.html"],
    ["🎓","Learning Path","Which lesson builds each piece","12 weeks","../learning/path.html"],
    ["🚀","Deployment","Ship it live","Go-live checklist","../docs/deployment.html"],
  ],
};

/* ============================================================
   RENDER (no edits needed below)
   ============================================================ */
document.documentElement.style.setProperty('--brand', COMPANY.accent);
document.title = COMPANY.name + " · Command Center";
document.getElementById('cname').textContent = COMPANY.name;
document.getElementById('ctag').textContent = COMPANY.tagline;
document.getElementById('logo').textContent = COMPANY.monogram || COMPANY.name[0];

const kpis = document.getElementById('kpis');
COMPANY.kpis.forEach(x=>{
  const d=document.createElement('div'); d.className='kpi';
  d.innerHTML=`<div class="k">${x.k}</div><div class="v">${x.v}</div>
    <div class="d ${x.up?'up':'dn'}">${x.d}</div>`;
  kpis.appendChild(d);
});

const grid = document.getElementById('grid');
COMPANY.modules.forEach(([ico,mt,md,ms,href])=>{
  const a=document.createElement('a'); a.className='mod'; a.href=href;
  a.innerHTML=`<span class="arrow">→</span><div class="ico">${ico}</div>
    <div class="mt">${mt}</div><div class="md">${md}</div><div class="ms">${ms}</div>`;
  grid.appendChild(a);
});

/* activity ticker */
const feed=document.getElementById('feed'); let fi=0;
function tick(){
  const [msg,ago]=COMPANY.activity[fi%COMPANY.activity.length];
  feed.style.opacity=0;
  setTimeout(()=>{ feed.innerHTML=`${msg}<span class="ago">${ago}</span>`; feed.style.opacity=1; },250);
  fi++;
}
tick(); setInterval(tick,3200);
</script>
</body>
</html>
