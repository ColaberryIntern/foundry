<!doctype html>
<html lang="en" data-theme="light">
<!--
  FOUNDRY — COMMAND CENTER TEMPLATE (the CEO cockpit / launch target)
  Colaberry Design System · LIGHT default with a dark toggle.
  Personalize by editing the COMPANY object below, or generate from data/company.json.
  Self-contained; ships populated with "Evergreen Grounds Co." so it renders as-is.
-->
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Command Center</title>
<script>(function(){var t=localStorage.getItem('foundry-theme')||'light';document.documentElement.setAttribute('data-theme',t);})();</script>
<style>
  :root{
    --red-500:#FB2832;--red-600:#E5121D;--red-700:#C20E1E;--red-50:#FFF0F1;--red-200:#FFB8BC;
    --green-500:#77BB4A;--green-600:#5BA63C;--green-50:#F1F9EA;
    --blue-500:#367895;--blue-600:#2E6A86;--blue-50:#EAF2F6;
    --n0:#fff;--n50:#F8F8F7;--n100:#F1F1F0;--n200:#E4E4E3;--n300:#D8D8D8;--n500:#8C8C8C;--n600:#6B6B6B;--n800:#2B2B2B;--n900:#1A1A1A;--n950:#0F0F0F;
    --font:'Roboto',system-ui,-apple-system,'Segoe UI',sans-serif;
    --bg:var(--n50);--surface:var(--n0);--sunken:var(--n100);--text:var(--n900);--body:var(--n800);--muted:var(--n600);--border:var(--n200);
    --brand:var(--red-500);
    --shadow-sm:0 1px 2px rgba(26,26,26,.06);--shadow-md:0 3px 10px rgba(26,26,26,.07);--shadow-lg:0 14px 34px rgba(26,26,26,.10);
  }
  [data-theme="dark"]{--bg:var(--n950);--surface:#16181d;--sunken:#20242b;--text:#fff;--body:#E4E4E3;--muted:#9aa3ad;--border:rgba(255,255,255,.14);--red-50:rgba(251,40,50,.16);--green-50:rgba(119,187,74,.16);--blue-50:rgba(54,120,149,.18);}
  *{box-sizing:border-box}
  body{margin:0;color:var(--body);font-family:var(--font);background:var(--bg);min-height:100vh;transition:background .25s,color .25s}
  .wrap{max-width:1240px;margin:0 auto;padding:24px 26px 72px}
  .top{display:flex;align-items:center;gap:16px;margin-bottom:8px}
  .logo{width:54px;height:54px;border-radius:15px;flex:0 0 auto;background:linear-gradient(135deg,var(--red-500),var(--red-700));display:grid;place-items:center;font-weight:800;color:#fff;font-size:26px;font-family:var(--font)}
  .name h1{margin:0;font-size:30px;font-weight:900;letter-spacing:-.01em;color:var(--text);font-family:var(--font)}
  .name .tag{color:var(--muted);font-size:15px;margin-top:3px}
  .right{margin-left:auto;display:flex;align-items:center;gap:12px}
  .live{display:flex;align-items:center;gap:8px;color:var(--muted);font-size:13px;background:var(--surface);border:1px solid var(--border);border-radius:999px;padding:8px 14px;box-shadow:var(--shadow-sm)}
  .pulse{width:9px;height:9px;border-radius:50%;background:var(--green-500);box-shadow:0 0 0 0 rgba(119,187,74,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(119,187,74,.5)}70%{box-shadow:0 0 0 10px rgba(119,187,74,0)}100%{box-shadow:0 0 0 0 rgba(119,187,74,0)}}
  .toggle{width:38px;height:38px;border-radius:999px;border:1px solid var(--border);background:var(--surface);color:var(--text);cursor:pointer;font-size:16px;display:grid;place-items:center;box-shadow:var(--shadow-sm)}
  .toggle:hover{border-color:var(--brand)}
  .ticker{margin:14px 0 26px;background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:12px 16px;display:flex;align-items:center;gap:12px;overflow:hidden;box-shadow:var(--shadow-sm)}
  .ticker .lbl{color:var(--green-600);font-size:12px;font-weight:800;letter-spacing:.1em;text-transform:uppercase;white-space:nowrap}
  .ticker .feed{color:var(--text);font-size:14px;white-space:nowrap;transition:opacity .4s}
  .ticker .feed .ago{color:var(--muted);margin-left:8px;font-size:12px}
  .kpis{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:28px}
  .kpi{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:18px;box-shadow:var(--shadow-sm)}
  .kpi .k{color:var(--muted);font-size:11px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
  .kpi .v{font-size:30px;font-weight:900;margin-top:8px;line-height:1;color:var(--text)}
  .kpi .d{font-size:12px;margin-top:8px;font-weight:700}
  .up{color:var(--green-600)}
  .seclabel{display:flex;align-items:center;gap:12px;margin:6px 0 16px;color:var(--muted);font-size:12px;letter-spacing:.14em;text-transform:uppercase;font-weight:700}
  .seclabel::after{content:"";flex:1;height:1px;background:var(--border)}
  .grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
  .mod{display:block;text-decoration:none;color:inherit;background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;transition:.16s;position:relative;box-shadow:var(--shadow-sm)}
  .mod:hover{transform:translateY(-3px);border-color:var(--brand);box-shadow:var(--shadow-lg);text-decoration:none}
  .mod .ico{font-size:26px}
  .mod .mt{font-weight:800;font-size:16px;margin-top:12px;color:var(--text)}
  .mod .md{color:var(--muted);font-size:13px;margin-top:5px;line-height:1.45;min-height:34px}
  .mod .ms{margin-top:12px;font-size:13px;font-weight:800;color:var(--green-600)}
  .mod.trust{border-color:color-mix(in srgb,var(--blue-500) 40%,var(--border));background:linear-gradient(180deg,var(--blue-50),var(--surface) 60%)}
  .mod .arrow{position:absolute;top:18px;right:18px;color:var(--muted);opacity:0;transition:.16s}
  .mod:hover .arrow{opacity:1;transform:translateX(2px)}
  .story{margin-top:34px;background:linear-gradient(135deg,var(--red-50),var(--green-50));border:1px solid var(--border);border-radius:18px;padding:28px;text-align:center}
  .story .big{font-size:23px;font-weight:900;color:var(--text)}
  .story .sub{color:var(--muted);margin-top:8px;font-size:15px}
  @media(max-width:1000px){.kpis{grid-template-columns:repeat(3,1fr)}.grid{grid-template-columns:repeat(2,1fr)}}
  @media(max-width:560px){.kpis{grid-template-columns:repeat(2,1fr)}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <div class="top">
    <div class="logo" id="logo">E</div>
    <div class="name">
      <h1 id="cname">Company Name</h1>
      <div class="tag" id="ctag">Tagline goes here</div>
    </div>
    <div class="right">
      <div class="live"><span class="pulse"></span> <span id="livetxt">All systems operational</span></div>
      <button class="toggle" id="toggle" title="Light / dark">🌙</button>
    </div>
  </div>

  <div class="ticker"><span class="lbl">◆ AI Workforce</span><span class="feed" id="feed">Booting the company…</span></div>

  <div class="kpis" id="kpis"></div>

  <div class="seclabel">Operating Modules</div>
  <div class="grid" id="grid"></div>

  <div class="story">
    <div class="big">That took about twelve minutes.</div>
    <div class="sub">Our students spend twelve weeks learning to build what you just watched. This isn't the project — this is <b>Lesson One</b>.</div>
  </div>
</div>

<script>
/* ============================================================
   PERSONALIZE HERE — Claude Code replaces this from data/company.json
   ============================================================ */
const COMPANY = {
  name: "Evergreen Grounds Co.",
  monogram: "E",
  tagline: "Full-service landscaping that runs itself.",
  kpis: [
    { k:"Revenue (ARR)", v:"$1.24M", d:"▲ 18% vs last yr" },
    { k:"Customers", v:"312", d:"▲ 24 this month" },
    { k:"AI Employees", v:"28", d:"● all active" },
    { k:"Trust (INPACT)", v:"85/100", d:"▲ from 28 in 90 days" },
    { k:"Pipeline", v:"$186K", d:"▲ 12% WoW" },
    { k:"CSAT", v:"4.8★", d:"▲ 0.2" },
  ],
  activity: [
    ["Lead Qualification Agent booked an appointment","2s ago"],
    ["Invoicing Agent sent invoice #1043 ($2,400)","11s ago"],
    ["Scheduling Agent routed 3 crews for tomorrow","28s ago"],
    ["Governance Agent logged a permitted action (INPACT: Permitted)","36s ago"],
    ["Marketing Agent published a spring-cleanup post","44s ago"],
    ["Review Agent requested a 5★ review from J. Alvarez","1m ago"],
  ],
  modules: [
    ["📊","Executive Dashboard","Live KPIs across the whole company","6 KPIs live","../dashboards/executive.html",""],
    ["🌐","Website","Hero, services nav & quote","312 visitors today","../website/index.html",""],
    ["🤝","CRM","Salesforce-style drag & drop pipeline","28 open deals","../crm/index.html",""],
    ["📣","Marketing","Power BI charts, channels & funnel","4 active campaigns","../marketing/plan.html",""],
    ["💰","Sales","Funnel, scripts & conversion","31% win rate","../sales/funnel.html",""],
    ["📈","Finance","12-month model & cash","$142K cash","../finance/model.html",""],
    ["🛠️","Operations","Scheduling, dispatch & jobs","41 jobs this week","../dashboards/operations.html",""],
    ["🔎","Analytics","Trends, cohorts & forecast","+22% forecast","../analytics/index.html",""],
    ["👥","Workforce","AI + human org chart","28 AI · 9 human","../workforce/org-chart.html",""],
    ["🤖","AI Employees","Your always-on AI team","28 active","../workforce/ai-employees.html",""],
    ["🛡️","Trust Dashboard","INPACT · 7-Layer · GOALS","INPACT 85/100","../trust/index.html","trust"],
    ["🗄️","Database","How the business actually runs","11 tables","../database/schema.html",""],
    ["📚","Knowledge Base","Search + Cory chatbot + 1-pagers","Ask anything","../knowledge/index.html",""],
    ["📋","SOPs","How the company runs","8 procedures","../sops/index.html",""],
    ["🗺️","Roadmap","90-day plan, hiring & KPIs","Day 1 today","../roadmap/index.html",""],
    ["🏛️","First Board Meeting","Your AI leadership team convenes","the close ↓","../boardroom/index.html","trust"],
  ],
};

document.title = COMPANY.name + " · Command Center";
document.getElementById('cname').textContent = COMPANY.name;
document.getElementById('ctag').textContent = COMPANY.tagline;
document.getElementById('logo').textContent = COMPANY.monogram || COMPANY.name[0];

const kpis=document.getElementById('kpis');
COMPANY.kpis.forEach(x=>{const d=document.createElement('div');d.className='kpi';
  d.innerHTML=`<div class="k">${x.k}</div><div class="v">${x.v}</div><div class="d up">${x.d}</div>`;kpis.appendChild(d);});

const grid=document.getElementById('grid');
COMPANY.modules.forEach(([ico,mt,md,ms,href,cls])=>{const a=document.createElement('a');a.className='mod'+(cls?' '+cls:'');a.href=href;
  a.innerHTML=`<span class="arrow">→</span><div class="ico">${ico}</div><div class="mt">${mt}</div><div class="md">${md}</div><div class="ms">${ms}</div>`;grid.appendChild(a);});

const feed=document.getElementById('feed');let fi=0;
function tick(){const [msg,ago]=COMPANY.activity[fi%COMPANY.activity.length];feed.style.opacity=0;
  setTimeout(()=>{feed.innerHTML=`${msg}<span class="ago">${ago}</span>`;feed.style.opacity=1;},250);fi++;}
tick();setInterval(tick,3200);

const tg=document.getElementById('toggle');
tg.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙';
tg.onclick=()=>{var d=document.documentElement,n=d.getAttribute('data-theme')==='dark'?'light':'dark';
  d.setAttribute('data-theme',n);localStorage.setItem('foundry-theme',n);tg.textContent=n==='dark'?'☀️':'🌙';};
</script>
</body>
</html>
